<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuwibot - {% block title %}{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
        nav .nav-links { display: flex; gap: 1rem; align-items: center; }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        nav a:hover, nav a.active { color: var(--text); background: var(--bg-input); }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .grid { display: grid; gap: 1.5rem; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .card h3 { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 0.5rem; }
        .card .value { font-size: 2rem; font-weight: 700; }
        .btn {
            padding: 0.6rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-success:hover { opacity: 0.9; }
        .btn-danger:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        input, select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            width: 100%;
        }
        input:focus { outline: 2px solid var(--primary); border-color: transparent; }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-success { background: #065f46; color: #6ee7b7; }
        .badge-warning { background: #78350f; color: #fcd34d; }
        .badge-danger { background: #7f1d1d; color: #fca5a5; }
        .badge-info { background: #1e3a5f; color: #93c5fd; }
        .notification-bell { position: relative; cursor: pointer; font-size: 1.25rem; }
        .notification-bell .count {
            position: absolute;
            top: -6px; right: -8px;
            background: var(--danger);
            color: white;
            font-size: 0.65rem;
            padding: 1px 5px;
            border-radius: 50px;
            display: none;
        }
        .notification-panel {
            display: none;
            position: absolute;
            top: 3rem; right: 0;
            width: 350px;
            max-height: 400px;
            overflow-y: auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 100;
        }
        .notification-panel.open { display: block; }
        .notif-item {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .notif-item.unread { border-left: 3px solid var(--primary); }
        .notif-item .notif-time { color: var(--text-muted); font-size: 0.75rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-dot.stopped { background: var(--danger); }
        .status-dot.waiting { background: var(--warning); animation: pulse 2s infinite; }
        .status-dot.interacting { background: var(--success); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .chat-bubble {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .chat-user {
            background: var(--bg-input);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .chat-robot {
            background: var(--primary);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        .chat-container { display: flex; flex-direction: column; gap: 0.5rem; }
        #toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--primary);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    {% block body %}{% endblock %}
    <div id="toast-container"></div>

    <script>
        const TOKEN_KEY = 'chuwibot_token';

        function getToken() { return localStorage.getItem(TOKEN_KEY); }
        function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
        function clearToken() { localStorage.removeItem(TOKEN_KEY); }

        async function apiFetch(url, options = {}) {
            const token = getToken();
            const headers = { ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            if (options.body && typeof options.body === 'object') {
                headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(options.body);
            }
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) { clearToken(); window.location.href = '/'; }
            return res;
        }

        function showToast(msg, duration = 4000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        function logout() { clearToken(); window.location.href = '/'; }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
