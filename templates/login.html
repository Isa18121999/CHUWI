{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block body %}
<div style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
    <div class="card" style="width:380px;">
        <div style="text-align:center; margin-bottom:1.5rem;">
            <div style="font-size:3rem;">🤖</div>
            <h1 style="font-size:1.5rem; margin-top:0.5rem;">Chuwibot</h1>
            <p style="color:var(--text-muted); font-size:0.85rem;">Panel de Control</p>
        </div>

        <form id="login-form" style="display:flex; flex-direction:column; gap:1rem;">
            <div>
                <label style="font-size:0.8rem; color:var(--text-muted);">Usuario</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            <div>
                <label style="font-size:0.8rem; color:var(--text-muted);">Contraseña</label>
                <input type="password" id="password" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Ingresar</button>
            <p id="login-error" style="color:var(--danger); font-size:0.85rem; text-align:center; display:none;"></p>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    if (getToken()) window.location.href = '/dashboard';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errEl = document.getElementById('login-error');
        errEl.style.display = 'none';

        const form = new URLSearchParams();
        form.append('username', document.getElementById('username').value);
        form.append('password', document.getElementById('password').value);

        const res = await fetch('/api/login', {
            method: 'POST',
            body: form,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });

        if (res.ok) {
            const data = await res.json();
            setToken(data.access_token);
            window.location.href = '/dashboard';
        } else {
            errEl.textContent = 'Credenciales incorrectas';
            errEl.style.display = 'block';
        }
    });
</script>
{% endblock %}
